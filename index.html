// ──────────────────────────────────────
// RENDER CARDS
// ──────────────────────────────────────
var grid = document.getElementById('grid');

function renderCards() {
  grid.innerHTML = '';
  prankConfigs.forEach(function(config, index) {
    var loc = config[currentLang];

        '<div class="link-item">' +

// ──────────────────────────────────────
// MODAL
// ──────────────────────────────────────
var modalOverlay = document.getElementById('modalOverlay');
var modalFrame = document.getElementById('modalFrame');
var modalTitle = document.getElementById('modalTitle');
var modalUrl = document.getElementById('modalUrl');
var modalClose = document.getElementById('modalClose');
var modalReset = document.getElementById('modalReset');
var modalCopyLink = document.getElementById('modalCopyLink');
var currentPreviewUrl = '';

function openPreview(url, title) {
  currentPreviewUrl = url;
  modalTitle.textContent = title;
  modalUrl.textContent = '📎 ' + url;
  modalFrame.src = url;
  modalOverlay.classList.add('show');
}

function closePreview() {
  modalOverlay.classList.remove('show');
  modalFrame.src = '';
  currentPreviewUrl = '';
}

modalClose.addEventListener('click', closePreview);
modalOverlay.addEventListener('click', function(e) {
  if (e.target === modalOverlay) closePreview();
});

modalReset.addEventListener('click', function() {
  if (currentPreviewUrl) {
    modalFrame.src = '';
    setTimeout(function() { modalFrame.src = currentPreviewUrl; }, 50);
  }
});

modalCopyLink.addEventListener('click', function() {
  if (currentPreviewUrl) copyToClipboard(currentPreviewUrl, modalCopyLink);
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePreview();
});

// ──────────────────────────────────────
// CARD BUTTON HANDLERS
// ──────────────────────────────────────
grid.addEventListener('click', function(e) {
  var previewBtn = e.target.closest('.btn-preview-sm');
  var copyBtn = e.target.closest('.btn-copy-sm');

  if (previewBtn) {
    var url = previewBtn.dataset.url;
    var title = previewBtn.dataset.title;
    openPreview(url, title);
  }

  if (copyBtn) {
    var url = copyBtn.dataset.url;
    copyToClipboard(url, copyBtn);
  }
});

// ──────────────────────────────────────
// COPY TO CLIPBOARD
// ──────────────────────────────────────
function copyToClipboard(url, btn) {
  var fullUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '') + url;

  function onSuccess() {
    var origText = btn.textContent;
    btn.textContent = '✅ ' + t('copied');
    btn.classList.add('copied');
    showToast(t('toast'));
    setTimeout(function() {
      btn.textContent = origText;
      btn.classList.remove('copied');
    }, 2000);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(fullUrl).then(onSuccess).catch(function() {
      fallbackCopy(fullUrl, btn, onSuccess);
    });
  } else {
    fallbackCopy(fullUrl, btn, onSuccess);
  }
}

function fallbackCopy(text, btn, cb) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) { showToast('Copy failed'); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

// ──────────────────────────────────────
// BACKGROUND PARTICLES

(function() {
  var canvas = document.createElement('canvas');
  canvas.className = 'bg-particles';
  document.body.prepend(canvas);
  var ctx = canvas.getContext('2d');
  var W, H;
  var particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  for (var i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 2 + 0.5,
      vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4 - 0.2,
      alpha: Math.random() * 0.3 + 0.05,
    });
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + p.alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
